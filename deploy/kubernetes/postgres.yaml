apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: zafiro-sync-postgres
  namespace: zafiro-sync
spec:
  instances: 1
  storage:
    size: 10Gi
  superuserSecret:
    name: zafiro-sync-postgres-superuser
  bootstrap:
    initdb:
      database: zafiro-sync
      owner: zafiro-sync
      secret:
        name: zafiro-sync-postgres-app

apiVersion: v1
kind: ConfigMap
metadata:
  name: zafiro-sync-api-config
  namespace: zafiro-sync
data:
  Authentication__RequireHttpsMetadata: "true"
  Authentication__Demo__Enabled: "false"
  Authentication__AppIdentity__ChallengeLifetimeSeconds: "300"
  Authentication__AppIdentity__SessionLifetimeSeconds: "900"
  ZafiroSync__MigrateOnStartup: "false"
  ZafiroSync__Apps__0__AppId: "fifo-calculator"
  ZafiroSync__Apps__0__DisplayName: "FIFO Calculator"
  ZafiroSync__Apps__0__MaxPlaintextBytes: "5242880"
  ZafiroSync__Apps__0__IsEnabled: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zafiro-sync-api
  namespace: zafiro-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zafiro-sync-api
  template:
    metadata:
      labels:
        app: zafiro-sync-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/zafiro-sync-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: zafiro-sync-api-config
            - secretRef:
                name: zafiro-sync-api-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: zafiro-sync-api
  namespace: zafiro-sync
spec:
  selector:
    app: zafiro-sync-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zafiro-sync-api
  namespace: zafiro-sync
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
    - hosts:
        - zafiro-sync.example.com
      secretName: zafiro-sync-api-tls
  rules:
    - host: zafiro-sync.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zafiro-sync-api
                port:
                  name: http

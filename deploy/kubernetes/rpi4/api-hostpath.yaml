apiVersion: v1
kind: ConfigMap
metadata:
  name: zafiro-sync-api-config
  namespace: zafiro-sync
data:
  ASPNETCORE_URLS: "http://+:8080"
  Authentication__RequireHttpsMetadata: "true"
  Authentication__Demo__Enabled: "false"
  Authentication__AppIdentity__ChallengeLifetimeSeconds: "300"
  Authentication__AppIdentity__SessionLifetimeSeconds: "900"
  ZafiroSync__MigrateOnStartup: "true"
  ZafiroSync__Apps__0__AppId: "fifo-calculator"
  ZafiroSync__Apps__0__DisplayName: "FIFO Calculator"
  ZafiroSync__Apps__0__MaxPlaintextBytes: "5242880"
  ZafiroSync__Apps__0__IsEnabled: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zafiro-sync-api
  namespace: zafiro-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zafiro-sync-api
  template:
    metadata:
      labels:
        app: zafiro-sync-api
    spec:
      containers:
        - name: api
          image: mcr.microsoft.com/dotnet/aspnet:10.0
          imagePullPolicy: IfNotPresent
          workingDir: /app
          command:
            - dotnet
            - /app/Zafiro.Sync.Api.dll
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: zafiro-sync-api-config
            - secretRef:
                name: zafiro-sync-api-secrets
          volumeMounts:
            - name: app-publish
              mountPath: /app
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: app-publish
          hostPath:
            path: /home/jmn/zafiro-sync/publish
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: zafiro-sync-api
  namespace: zafiro-sync
spec:
  selector:
    app: zafiro-sync-api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zafiro-sync-api
  namespace: zafiro-sync
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: filesync.superjmn.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zafiro-sync-api
                port:
                  number: 8080
  tls:
    - hosts:
        - filesync.superjmn.com
      secretName: zafiro-sync-api-tls

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: appfilesync-postgres
  namespace: appfilesync
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: appfilesync-postgres
  namespace: appfilesync
spec:
  serviceName: appfilesync-postgres
  replicas: 1
  selector:
    matchLabels:
      app: appfilesync-postgres
  template:
    metadata:
      labels:
        app: appfilesync-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: appfilesync
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: appfilesync-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appfilesync-postgres
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - appfilesync
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: appfilesync-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: appfilesync-postgres
  namespace: appfilesync
spec:
  selector:
    app: appfilesync-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zafiro-sync-postgres
  namespace: zafiro-sync
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zafiro-sync-postgres
  namespace: zafiro-sync
spec:
  serviceName: zafiro-sync-postgres
  replicas: 1
  selector:
    matchLabels:
      app: zafiro-sync-postgres
  template:
    metadata:
      labels:
        app: zafiro-sync-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: zafiro-sync
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zafiro-sync-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zafiro-sync-postgres
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - zafiro-sync
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zafiro-sync-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: zafiro-sync-postgres
  namespace: zafiro-sync
spec:
  selector:
    app: zafiro-sync-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
